<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Hexágono Branco Minimalista</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let tempo = 0;
        let progressoHex = 0.5; 
        let direcaoHex = 1;
        let rotHex = 0; 
        const comprimentoLinha = 500; 
        const raioHex = 30;

        function desenharHexagono(x, y, anguloRotacao) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(anguloRotacao);
            
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const ang = (Math.PI / 3) * i;
                const px = raioHex * Math.cos(ang);
                const py = raioHex * Math.sin(ang);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            
            // Hexágono Totalmente Branco
            ctx.fillStyle = 'white';
            ctx.fill();
            // Um pequeno contorno suave para não serrilhar
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            ctx.restore();
        }

        function animar() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // 1. Ângulo da linha (Suave)
            const anguloLinha = Math.sin(tempo) * 0.5;

            // 2. Pontas da linha (Cálculo de comprimento fixo)
            const x1 = cx - (comprimentoLinha / 2) * Math.cos(anguloLinha);
            const y1 = cy - (comprimentoLinha / 2) * Math.sin(anguloLinha);
            const x2 = cx + (comprimentoLinha / 2) * Math.cos(anguloLinha);
            const y2 = cy + (comprimentoLinha / 2) * Math.sin(anguloLinha);

            // Desenhar linha branca
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 3. Física de movimento e "Parede" da linha
            let velBase = 0.007;
            let gravidade = Math.sin(anguloLinha) * 0.012; 
            let deslocamento = (velBase * direcaoHex) + gravidade;
            
            progressoHex += deslocamento;

            // Inversão de sentido baseada no comprimento da linha (0 a 1)
            // Isso evita que ele saia da linha ou bata em paredes laterais
            if (progressoHex >= 1) {
                progressoHex = 1;
                direcaoHex = -1;
            } else if (progressoHex <= 0) {
                progressoHex = 0;
                direcaoHex = 1;
            }

            // O giro acompanha o deslocamento exato para parecer que está rolando
            rotHex += deslocamento * 15; 

            // 4. Posicionamento Colado na Linha
            const hexX = x1 + (x2 - x1) * progressoHex;
            const hexY = y1 + (y2 - y1) * progressoHex;

            // Offset para o hexágono ficar sobre a linha, não atravessado
            const offY = (raioHex + 1.5) * Math.cos(anguloLinha);
            const offX = (raioHex + 1.5) * Math.sin(anguloLinha);

            desenharHexagono(hexX - offX, hexY - offY, rotHex);

            tempo += 0.02;
            requestAnimationFrame(animar);
        }

        animar();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
